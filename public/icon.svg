<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- App icon v6: Mercedes Sprinter, fixes from v5: proper 3-pointed
       Mercedes star (computed vertices), tail light brought in from the
       edge, slightly stretched body for Sprinter's true 1.8:1 aspect. -->

  <!-- Background -->
  <rect width="1024" height="1024" fill="#2a2e36"/>
  <ellipse cx="512" cy="888" rx="450" ry="14" fill="#000000" opacity="0.5"/>

  <!-- ===== BODY (solid black, longer, high-roof Sprinter) ===== -->
  <path d="
    M 980 800
    L 980 270
    Q 980 245 955 245
    L 220 245
    Q 198 245 186 266
    L 100 432
    L 75 432
    Q 50 432 42 458
    L 32 552
    Q 28 580 28 608
    L 28 800
    Z"
    fill="#0d0d0d"/>

  <!-- Roof top edge highlight -->
  <rect x="225" y="248" width="730" height="3" fill="#3a3a3a"/>

  <!-- ===== WINDOWS (solid light blue) ===== -->
  <!-- Windshield -->
  <path d="M 192 282 L 132 405 L 178 405 L 228 282 Z" fill="#b8cee0"/>
  <!-- Driver door window -->
  <rect x="246" y="282" width="100" height="135" rx="10" fill="#b8cee0"/>
  <!-- Long side window (cab + cargo) -->
  <rect x="366" y="282" width="555" height="135" rx="10" fill="#b8cee0"/>
  <!-- B-pillar split -->
  <rect x="590" y="282" width="14" height="135" fill="#0d0d0d"/>

  <!-- ===== FRONT ===== -->
  <!-- Upper grille bar (where the star sits) -->
  <rect x="36" y="475" width="218" height="36" rx="4" fill="#2a2a2a"/>

  <!-- Mercedes 3-pointed star: outer ring + 3-pointed star path.
       Vertices computed by sin/cos at 60° spacing, R=22 outer, r=5.5 inner. -->
  <g transform="translate(145 493)">
    <!-- Badge outer ring (silver) -->
    <circle r="34" fill="#d8d8d8"/>
    <!-- Badge inner (dark) -->
    <circle r="29" fill="#0a0a0a"/>
    <!-- 3-pointed star (silver) -->
    <path d="M 0,-25 L 5.5,-3 L 21.6,12.5 L 0,7 L -21.6,12.5 L -5.5,-3 Z" fill="#d8d8d8"/>
  </g>

  <!-- Headlights (one on either side of the star) -->
  <rect x="38" y="520" width="94" height="44" rx="6" fill="#fff5c8"/>
  <rect x="46" y="532" width="78" height="10" rx="3" fill="#ffc23a"/>
  <rect x="160" y="520" width="94" height="44" rx="6" fill="#fff5c8"/>
  <rect x="168" y="532" width="78" height="10" rx="3" fill="#ffc23a"/>

  <!-- Lower grille / bumper -->
  <rect x="30" y="610" width="240" height="64" rx="6" fill="#2a2a2a"/>
  <rect x="45" y="624" width="210" height="6" rx="2" fill="#5a5a5a"/>
  <rect x="45" y="640" width="210" height="6" rx="2" fill="#5a5a5a"/>
  <rect x="45" y="656" width="210" height="6" rx="2" fill="#5a5a5a"/>

  <!-- ===== REAR ===== -->
  <!-- Rear door split -->
  <rect x="938" y="265" width="4" height="525" fill="#000000" opacity="0.65"/>
  <!-- Tail light (vertical red strip, inset from edge) -->
  <rect x="912" y="290" width="30" height="225" rx="4" fill="#cc1f1f"/>
  <rect x="918" y="300" width="18" height="205" rx="3" fill="#ee5050"/>

  <!-- ===== SIDE DETAILS ===== -->
  <rect x="364" y="430" width="572" height="3" fill="#000000" opacity="0.55"/>
  <!-- Sliding-door handle -->
  <rect x="685" y="540" width="80" height="22" rx="5" fill="#3a3a3a"/>
  <rect x="690" y="546" width="70" height="3" rx="1.5" fill="#5a5a5a"/>
  <!-- Body crease -->
  <rect x="32" y="713" width="950" height="3" fill="#000000" opacity="0.55"/>

  <!-- ===== WHEELS ===== -->
  <g>
    <!-- Front -->
    <circle cx="240" cy="795" r="82" fill="#0a0a0a"/>
    <circle cx="240" cy="795" r="62" fill="#1a1a1a"/>
    <circle cx="240" cy="795" r="38" fill="#4a4a4a"/>
    <circle cx="240" cy="767" r="5" fill="#9a9a9a"/>
    <circle cx="268" cy="795" r="5" fill="#9a9a9a"/>
    <circle cx="240" cy="823" r="5" fill="#9a9a9a"/>
    <circle cx="212" cy="795" r="5" fill="#9a9a9a"/>
    <circle cx="240" cy="795" r="10" fill="#0a0a0a"/>
    <!-- Rear -->
    <circle cx="810" cy="795" r="82" fill="#0a0a0a"/>
    <circle cx="810" cy="795" r="62" fill="#1a1a1a"/>
    <circle cx="810" cy="795" r="38" fill="#4a4a4a"/>
    <circle cx="810" cy="767" r="5" fill="#9a9a9a"/>
    <circle cx="838" cy="795" r="5" fill="#9a9a9a"/>
    <circle cx="810" cy="823" r="5" fill="#9a9a9a"/>
    <circle cx="782" cy="795" r="5" fill="#9a9a9a"/>
    <circle cx="810" cy="795" r="10" fill="#0a0a0a"/>
  </g>

  <!-- Wheel arches (where wheels cut into body) -->
  <path d="M 166 735 Q 240 658 314 735 L 314 770 L 166 770 Z" fill="#0a0a0a"/>
  <path d="M 736 735 Q 810 658 884 735 L 884 770 L 736 770 Z" fill="#0a0a0a"/>
</svg>
